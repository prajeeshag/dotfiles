
- clean: ['~']
        
- link:
    ~/.vimrc:
    ~/.vim:  
    ~/.zshrc:
        if: '[ `hostname` = "Prajeeshs-MacBook-Air.local" ]'
    ~/.bashrc:
        if: '[ `uname` = Linux ]'
        path: zshrc
    ~/.functions:
    ~/.aliases:
    ~/.exports:

- shell:
    - [git submodule update --init --recursive, Installing/updating submodules]
    - [vim -es -u vimrc -i NONE -c "PlugInstall" -c "qa"]
